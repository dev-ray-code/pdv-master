<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Clientes - Controle Store</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.sidebar{
    width:260px;
    min-height:100vh;
    background:#0d6efd;
    color:white;
}

.sidebar h3{
    padding:20px;
    text-align:center;
}

.sidebar a{
    color:white;
    display:block;
    text-decoration:none;
    padding:15px 20px;
}

.sidebar a:hover{
    background:#0b5ed7;
}

.content{
    flex:1;
    padding:30px;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

</style>

</head>

<body>

<div class="d-flex">

<div class="sidebar">

<h3>
<i class="bi bi-shield-lock"></i>
Controle Store
</h3>

<a href="/dashboard">
<i class="bi bi-speedometer2"></i>
Dashboard
</a>

<a href="/clientes">
<i class="bi bi-people"></i>
Clientes
</a>

<a href="/licencas">
<i class="bi bi-key"></i>
Licenças
</a>

<a href="#">
<i class="bi bi-arrow-repeat"></i>
Atualizações
</a>

<a href="#">
<i class="bi bi-gear"></i>
Configurações
</a>

</div>

<div class="content">

<h2>Clientes</h2>

<p>Cadastro e gerenciamento de clientes.</p>

<div class="card p-4 mt-4">

<h4>Novo Cliente</h4>

<div class="row">

<div class="col-md-6">

<label>Nome</label>
<input id="nome" class="form-control">

</div>

<div class="col-md-6">

<label>Empresa</label>
<input id="empresa" class="form-control">

</div>

<div class="col-md-6 mt-3">

<label>Telefone</label>
<input id="telefone" class="form-control">

</div>

<div class="col-md-6 mt-3">

<label>Email</label>
<input id="email" class="form-control">

</div>

<div class="col-md-6 mt-3">

<label>Cidade</label>
<input id="cidade" class="form-control">

</div>

<div class="col-md-6 mt-3">

<label>Estado</label>
<input id="estado" class="form-control">

</div>

<div class="col-12 mt-4">

<button class="btn btn-primary" onclick="cadastrarCliente()">
Cadastrar Cliente
</button>

</div>

</div>

</div>

<div class="card p-4 mt-4">

    <h4>Clientes Cadastrados</h4>

    <table class="table table-striped table-hover mt-3">

        <thead class="table-primary">

            <tr>
                <th>Nome</th>
                <th>Empresa</th>
                <th>Telefone</th>
                <th>Email</th>
                <th>Cidade</th>
                <th>Estado</th>
                <th>Ações</th>
            </tr>

        </thead>

        <tbody id="listaClientes">

        </tbody>

    </table>

</div>

</div>

</div>

<script>

async function carregarClientes(){

    const resposta = await fetch("/licencas/clientes/listar");
    const clientes = await resposta.json();

    let tabela = document.getElementById("listaClientes");
    tabela.innerHTML = "";

    clientes.forEach(cliente => {

        tabela.innerHTML += `
        <tr>

            <td>${cliente.nome}</td>
            <td>${cliente.empresa}</td>
            <td>${cliente.telefone}</td>
            <td>${cliente.email}</td>
            <td>${cliente.cidade}</td>
            <td>${cliente.estado}</td>

            <td>
                <button class="btn btn-danger btn-sm"
                    onclick="excluirCliente(${cliente.id})">
                    Excluir
                </button>
            </td>

        </tr>
        `;

    });

}

async function excluirCliente(id){

    if(!confirm("Deseja excluir este cliente?")){
        return;
    }

    await fetch("/licencas/clientes/excluir/" + id,{
        method:"DELETE"
    });

    carregarClientes();

}

async function cadastrarCliente(){

    let nome = document.getElementById("nome").value;
    let empresa = document.getElementById("empresa").value;
    let telefone = document.getElementById("telefone").value;
    let email = document.getElementById("email").value;
    let cidade = document.getElementById("cidade").value;
    let estado = document.getElementById("estado").value;

    await fetch(
        "/licencas/clientes/criar?" +
        "nome=" + encodeURIComponent(nome) +
        "&empresa=" + encodeURIComponent(empresa) +
        "&telefone=" + encodeURIComponent(telefone) +
        "&email=" + encodeURIComponent(email) +
        "&cidade=" + encodeURIComponent(cidade) +
        "&estado=" + encodeURIComponent(estado),
        {
            method:"POST"
        }
    );

    alert("Cliente cadastrado com sucesso!");

    document.getElementById("nome").value = "";
    document.getElementById("empresa").value = "";
    document.getElementById("telefone").value = "";
    document.getElementById("email").value = "";
    document.getElementById("cidade").value = "";
    document.getElementById("estado").value = "";

    carregarClientes();

}

carregarClientes();

</script>

</body>
</html>
